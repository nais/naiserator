testconfig:
  description: applications with idporten sidecar needs wonderwall
config:
  features:
    idporten: true
    wonderwall: false
  domain-ingressclass-mapping:
    .nav.no:
      - nav-no-gateway
input:
  kind: "Application"
  apiVersion: nais.io/v1alpha1
  metadata:
    name: myapplication
    namespace: mynamespace
  spec:
    idporten:
      enabled: true
      sidecar:
        enabled: true
    ingresses:
      - "https://my-client.nav.no/"
error: "idporten sidecar is not enabled for this cluster"
