testconfig:
  description: ingress haproxy migration handles limit-rpm
config:
  features:
    haproxy: true
  domain-ingressclass-mapping:
    - domainSuffix: .bar
      ingressClass: very-haproxy
input:
  kind: Application
  apiVersion: nais.io/v1alpha1
  metadata:
    name: myapplication
    annotations:
      nginx.ingress.kubernetes.io/limit-rpm: "500"
  spec:
    ingresses:
      - https://foo.bar/baz
tests:
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    name: myapplication-very-haproxy-efe42262
    operation: CreateOrUpdate
    match:
      - type: subset
        name: "ingress created with correct annotations"
        resource:
          metadata:
            annotations:
              haproxy.org/rate-limit-request: "500"
